# Marketplace release-on-merge shim — the n=1 dogfood (WP-005).
#
# This repo OWNS the reusable workflow. So unlike the canonical *consumer*
# shim (plugins/sulis/templates/shims/release-on-merge.yml), which pins a
# cross-repo reference at a SemVer tag
# (uses: sulis-ai/agents/.../release-on-merge.yml@sulis-vN.M.K), the
# marketplace's own shim uses a LOCAL PATH reference:
#   uses: ./plugins/sulis/templates/workflows/release-on-merge.yml
# A local ref always tracks the current commit's copy of the workflow — no
# version-pin lag for the repo that owns it, and no tag that must pre-exist.
# Consumers pin a tag; the owner references locally.
#
# This is the n=1 dogfood: the marketplace eats its own reusable workflow,
# so every production release here exercises the exact code path consumers
# will use (TDD §4.2 comp-marketplace-shim; §6.5; §9.1).
#
# LOOP-GUARD (load-bearing). The reusable workflow's job-level `if:` SKIPS
# the bot's own `release: sulis` commits (matched on author/actor ==
# github-actions[bot]) so the release push-back does not re-trigger an
# infinite release loop. GitHub propagates this `push` event's context
# (github.event.head_commit.*, github.actor) into the workflow_call-invoked
# reusable workflow, so that guard still fires through the indirection — the
# shim does not need its own copy. (The previous 280-line workflow body now
# lives at plugins/sulis/templates/workflows/release-on-merge.yml; git
# history is the record of the prior shape.)

name: Release on merge to main

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-on-merge
  cancel-in-progress: false

jobs:
  release:
    uses: ./plugins/sulis/templates/workflows/release-on-merge.yml
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
