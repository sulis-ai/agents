name: promote-dev-to-main
# RC-04 / RC-13: the dev→main promotion ceremony (GIT-06). Manual dispatch.
# Fast-forwards main to dev, cuts a signed SemVer tag, pushes.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer release tag (e.g. v1.86.1)'
        required: true
jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - name: fast-forward main + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --ff-only origin/dev
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin main --tags
