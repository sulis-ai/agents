name: sulis executor tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        # pytest is the only dev dependency; the wpx-* tools themselves
        # are stdlib-only per the plugin contract.
        # (Scripts + tests + _wpxlib moved from plugins/sulis-execution/
        # to plugins/sulis/ in v0.30.0 consolidation; workflow paths
        # updated to match.)
        run: pip install pytest

      - name: Run wpx-* tests
        run: pytest plugins/sulis/scripts/tests/ -v
