name: sulis executor tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        # Single source of truth for Brain↔OS Python deps lives in
        # plugins/sulis/scripts/pyproject.toml; `uv sync --frozen` installs
        # the exact set pinned in uv.lock. Closes #112 — there is no longer
        # a per-workflow `pip install` list to keep in sync.
        # (Scripts + tests + _wpxlib moved from plugins/sulis-execution/
        # to plugins/sulis/ in v0.30.0 consolidation; workflow paths
        # updated to match.)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv sync --frozen)
        working-directory: plugins/sulis/scripts
        run: uv sync --frozen

      - name: Configure git identity
        # The integration testbed performs real git operations; runners
        # have no default committer identity.
        run: |
          git config --global user.email "ci@sulis-ai.invalid"
          git config --global user.name "sulis-ci"

      - name: Run wpx-* tests
        working-directory: plugins/sulis/scripts
        run: uv run pytest tests/ -v
