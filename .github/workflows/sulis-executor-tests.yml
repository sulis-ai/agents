name: sulis executor tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest + Brain↔OS deps
        # External runtime deps introduced by the Brain↔OS substrate layer:
        #   jsonschema (2026-05-30, CH-01KSWB) — entity-instance validation
        #     against vendored compiled JSON Schemas.
        #   pyyaml     (2026-05-30, CH-01KSWM) — ServiceSpec manifest parsing
        #     in _servicespec_validator.py (Slice 2 / P7 rubric phase).
        # The wpx-* tools themselves remain stdlib-only per the plugin
        # contract; these deps are scoped to the Brain↔OS seam.
        # (Scripts + tests + _wpxlib moved from plugins/sulis-execution/
        # to plugins/sulis/ in v0.30.0 consolidation; workflow paths
        # updated to match.) See #112 for the longer-term requirements-file fix.
        run: pip install pytest jsonschema pyyaml

      - name: Configure git identity
        # The integration testbed performs real git operations; runners
        # have no default committer identity.
        run: |
          git config --global user.email "ci@sulis-ai.invalid"
          git config --global user.name "sulis-ci"

      - name: Run wpx-* tests
        run: pytest plugins/sulis/scripts/tests/ -v
