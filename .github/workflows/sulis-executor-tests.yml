name: sulis executor tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'plugins/sulis/scripts/**'
      - '.github/workflows/sulis-executor-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest + jsonschema
        # pytest is the test runner; jsonschema is the runtime dep introduced
        # by the Brain↔OS substrate layer (`_entity_adapter_local.py` —
        # CH-01KSWB, 2026-05-30). The wpx-* tools themselves remain stdlib-
        # only per the plugin contract; jsonschema is scoped to the
        # entity-validation seam.
        # (Scripts + tests + _wpxlib moved from plugins/sulis-execution/
        # to plugins/sulis/ in v0.30.0 consolidation; workflow paths
        # updated to match.)
        run: pip install pytest jsonschema

      - name: Configure git identity
        # The integration testbed performs real git operations; runners
        # have no default committer identity.
        run: |
          git config --global user.email "ci@sulis-ai.invalid"
          git config --global user.name "sulis-ci"

      - name: Run wpx-* tests
        run: pytest plugins/sulis/scripts/tests/ -v
