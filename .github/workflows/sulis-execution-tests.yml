name: sulis-execution tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'plugins/sulis-execution/scripts/**'
      - '.github/workflows/sulis-execution-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'plugins/sulis-execution/scripts/**'
      - '.github/workflows/sulis-execution-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        # pytest is the only dev dependency; the wpx-* tools themselves
        # are stdlib-only per the plugin contract.
        run: pip install pytest

      - name: Run wpx-* tests
        run: pytest plugins/sulis-execution/scripts/tests/ -v
