name: branch-ci
# RC-04 / RC-13: per-WP fast checks. Required status check for merge-queue entry.
# Marketplace profile: lint = manifest JSON validity + py_compile; tests = pytest;
# smoke = manifest parse (no network deps). No deploy target — see .sulis/repo-contract.yml.
on:
  pull_request:
    branches: [dev]
  push:
    branches:
      - 'feat/wp-*'
      - 'change/*'
concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  branch-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        # Single source of truth for Brain↔OS Python deps lives in
        # plugins/sulis/scripts/pyproject.toml; `uv sync --frozen` installs
        # the exact set pinned in uv.lock. Replaces the prior inline
        # `pip install ...` pattern (which silently degraded into the
        # missed-dep failure class — captured as #112). The wpx-* tooling
        # itself remains stdlib-only; runtime deps are scoped to the
        # Brain↔OS seam (entity persistence + ServiceSpec validation).
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv sync --frozen)
        working-directory: plugins/sulis/scripts
        run: uv sync --frozen

      - name: Configure git identity
        run: |
          git config --global user.email "ci@sulis-ai.invalid"
          git config --global user.name "sulis-ci"

      - name: lint — manifest JSON validity + python compile
        run: |
          python3 -c "import json,glob,sys; [json.load(open(f)) for f in ['.claude-plugin/marketplace.json', *glob.glob('plugins/*/.claude-plugin/plugin.json')]]; print('manifests OK')"
          python3 -m compileall -q plugins/sulis/scripts

      - name: routing coverage gate
        # Fails the build if any skill is neither routed nor excluded (orphan),
        # or two routes share an invocation (duplicate). Stdlib only, no network.
        run: python3 plugins/sulis/scripts/sulis-route check --repo-root .

      - name: type-check — (none configured; stdlib-only tooling per plugin contract)
        run: echo "no type-checker configured for this repo"

      - name: unit tests
        # RC-13: branch-ci runs UNIT tests only (fast gate). Integration
        # tests (the real-git train testbed) run in merge-queue-ci.
        working-directory: plugins/sulis/scripts
        run: uv run pytest tests/unit/ -q

      - name: smoke — manifest parse + plugin layout
        run: |
          python3 -c "import json; m=json.load(open('.claude-plugin/marketplace.json')); assert m['plugins'], 'no plugins in marketplace'; print(f\"{len(m['plugins'])} plugins resolve\")"
