name: branch-ci
# RC-04 / RC-13: per-WP fast checks. Required status check for merge-queue entry.
# Marketplace profile: lint = manifest JSON validity + py_compile; tests = pytest;
# smoke = manifest parse (no network deps). No deploy target — see .sulis/repo-contract.yml.
on:
  pull_request:
    branches: [dev]
  push:
    branches:
      - 'feat/wp-*'
      - 'change/*'
concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  branch-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        # Single source of truth for Brain↔OS Python deps lives in
        # plugins/sulis/scripts/pyproject.toml; `uv sync --frozen` installs
        # the exact set pinned in uv.lock. Replaces the prior inline
        # `pip install ...` pattern (which silently degraded into the
        # missed-dep failure class — captured as #112). The wpx-* tooling
        # itself remains stdlib-only; runtime deps are scoped to the
        # Brain↔OS seam (entity persistence + ServiceSpec validation).
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv sync --frozen)
        working-directory: plugins/sulis/scripts
        run: uv sync --frozen

      - name: Configure git identity
        run: |
          git config --global user.email "ci@sulis-ai.invalid"
          git config --global user.name "sulis-ci"

      - name: lint — manifest JSON validity + python compile
        run: |
          python3 -c "import json,glob,sys; [json.load(open(f)) for f in ['.claude-plugin/marketplace.json', *glob.glob('plugins/*/.claude-plugin/plugin.json')]]; print('manifests OK')"
          python3 -m compileall -q plugins/sulis/scripts

      - name: routing coverage gate
        # Fails the build if any skill is neither routed nor excluded (orphan),
        # or two routes share an invocation (duplicate). Stdlib only, no network.
        run: python3 plugins/sulis/scripts/sulis-route check --repo-root .

      - name: type-check — (none configured; stdlib-only tooling per plugin contract)
        run: echo "no type-checker configured for this repo"

      - name: unit tests
        # RC-13: branch-ci runs UNIT tests only (fast gate). Integration
        # tests (the real-git train testbed) run in merge-queue-ci.
        working-directory: plugins/sulis/scripts
        run: uv run pytest tests/unit/ -q

      - name: smoke — manifest parse + plugin layout
        run: |
          python3 -c "import json; m=json.load(open('.claude-plugin/marketplace.json')); assert m['plugins'], 'no plugins in marketplace'; print(f\"{len(m['plugins'])} plugins resolve\")"

  # canonical:meta:drift-detector
  # WP-008: wire the Path A drift detector (check-canonical-drift.py, built
  # in WP-007) into branch-ci. Runs at PR time against the live canonical
  # entity instances and release-on-merge.yml. Exits 0 (clean), 1 (drift),
  # 2 (invocation error).
  #
  # BLOCKING MODE (tighten-drift-gate, WP-001): the 11 pre-existing
  # reconciliation items the wave-5b dogfood surfaced have been encoded.
  # Six (gate-founder-confirmation, open-release-pr,
  # wait-for-checks-and-mergeability, publish-github-release, squash-merge,
  # preflight-cross-branch-drift) are honoured via the `excluded_from_yaml`
  # envelope signal on steps.jsonld — they live in skill prose per MUC-007,
  # the GitHub PR-merge UI, or the downstream release-prod.yml workflow.
  # The five missing_failuremode_handling items either resolve when their
  # parent Steps are excluded, or were filled with explicit annotations
  # (probabilistic-step-token-budget-exceeded on Step 5
  # draft-pr-body-and-changelog). The detector now exits 0 cleanly on the
  # live tree, so the gate is a real blocking check. Branch protection on
  # `dev` treats this as required-passing alongside the existing branch-ci
  # job.
  canonical-drift-check:
    name: Canonical-vs-implementation drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv sync --frozen)
        working-directory: plugins/sulis/scripts
        run: uv sync --frozen

      - name: Run drift detector
        # Stdlib-only at the script layer (the detector reads jsonld + yaml
        # via deps already installed by uv sync above). Exit-1-on-drift now
        # fails the step → fails the job → fails branch-ci as a required
        # status check.
        run: |
          # Paths are absolute (via $GITHUB_WORKSPACE) because
          # `uv run --directory plugins/sulis/scripts` changes the working
          # directory before the Python script runs — relative paths would
          # resolve against `plugins/sulis/scripts/` and break. Bug surfaced
          # as the first failure of the blocking drift gate landed in
          # tighten-drift-gate. Refs CH-01KT1Z.
          uv run --directory plugins/sulis/scripts python check-canonical-drift.py \
            --instance-dir "$GITHUB_WORKSPACE/plugins/sulis/instances/release-train" \
            --yaml-path "$GITHUB_WORKSPACE/.github/workflows/release-on-merge.yml"
