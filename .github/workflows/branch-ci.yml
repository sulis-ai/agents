name: branch-ci
# RC-04 / RC-13: per-WP fast checks. Required status check for merge-queue entry.
# Marketplace profile: lint = manifest JSON validity + py_compile; tests = pytest;
# smoke = manifest parse (no network deps). No deploy target — see .sulis/repo-contract.yml.
on:
  pull_request:
    branches: [dev]
  push:
    branches:
      - 'feat/wp-*'
      - 'change/*'
concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  branch-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        # Single source of truth for Brain↔OS Python deps lives in
        # plugins/sulis/scripts/pyproject.toml; `uv sync --frozen` installs
        # the exact set pinned in uv.lock. Replaces the prior inline
        # `pip install ...` pattern (which silently degraded into the
        # missed-dep failure class — captured as #112). The wpx-* tooling
        # itself remains stdlib-only; runtime deps are scoped to the
        # Brain↔OS seam (entity persistence + ServiceSpec validation).
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv sync --frozen)
        working-directory: plugins/sulis/scripts
        run: uv sync --frozen

      - name: Configure git identity
        run: |
          git config --global user.email "ci@sulis-ai.invalid"
          git config --global user.name "sulis-ci"

      - name: lint — manifest JSON validity + python compile
        run: |
          python3 -c "import json,glob,sys; [json.load(open(f)) for f in ['.claude-plugin/marketplace.json', *glob.glob('plugins/*/.claude-plugin/plugin.json')]]; print('manifests OK')"
          python3 -m compileall -q plugins/sulis/scripts

      - name: routing coverage gate
        # Fails the build if any skill is neither routed nor excluded (orphan),
        # or two routes share an invocation (duplicate). Stdlib only, no network.
        run: python3 plugins/sulis/scripts/sulis-route check --repo-root .

      - name: type-check — (none configured; stdlib-only tooling per plugin contract)
        run: echo "no type-checker configured for this repo"

      - name: unit tests
        # RC-13: branch-ci runs UNIT tests only (fast gate). Integration
        # tests (the real-git train testbed) run in merge-queue-ci.
        working-directory: plugins/sulis/scripts
        run: uv run pytest tests/unit/ -q

      - name: smoke — manifest parse + plugin layout
        run: |
          python3 -c "import json; m=json.load(open('.claude-plugin/marketplace.json')); assert m['plugins'], 'no plugins in marketplace'; print(f\"{len(m['plugins'])} plugins resolve\")"

  # canonical:meta:drift-detector
  # WP-008: wire the Path A drift detector (check-canonical-drift.py, built
  # in WP-007) into branch-ci. Runs at PR time against the live canonical
  # entity instances and release-on-merge.yml. Exits 0 (clean), 1 (drift),
  # 2 (invocation error).
  #
  # ADVISORY MODE for v1 (continue-on-error: true): the wave-5b dogfood
  # found 11 pre-existing reconciliation items (6 missing_in_yaml +
  # 5 missing_failuremode_handling) which are mostly by-design absences
  # (Steps 1-8 live in skill prose per MUC-007). Advisory mode surfaces
  # drift in the run logs without blocking PR merges. The failed-step
  # indicator remains visible in the GitHub UI so reviewers see drift.
  #
  # TO FLIP TO BLOCKING (once the 11 items are reconciled in a follow-on
  # change): remove the `continue-on-error: true` line below. Branch
  # protection on `dev` will then treat this check as required-passing
  # alongside the existing branch-ci job.
  canonical-drift-check:
    name: Canonical-vs-implementation drift (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv sync --frozen)
        working-directory: plugins/sulis/scripts
        run: uv sync --frozen

      - name: Run drift detector
        # Stdlib-only at the script layer (the detector reads jsonld + yaml
        # via deps already installed by uv sync above). Exit-1-on-drift is
        # converted to a GitHub Actions warning annotation; the step exits 0
        # so the check conclusion is success (advisory mode for v1).
        #
        # `continue-on-error: true` on the JOB lets the workflow continue
        # past a failed step, but the check CONCLUSION is still recorded as
        # "failure" — which the release-train's bundled-tip CI poll treats
        # as a fail. Wrapping with `|| echo "::warning::..."` keeps drift
        # visible (logs + GitHub annotation) while making the check green.
        #
        # When the 11 pre-existing reconciliation items (recorded in train
        # train-2026-06-01T124607Z's bundle Watch List) are addressed in a
        # follow-on change, drop the wrapper + remove `continue-on-error:
        # true` to flip this to a true blocking gate.
        run: |
          uv run --directory plugins/sulis/scripts python check-canonical-drift.py \
            --instance-dir plugins/sulis/instances/release-train \
            --yaml-path .github/workflows/release-on-merge.yml \
            || echo "::warning::Canonical-vs-implementation drift detected (advisory mode for v1; see job output above + the release-train change's train-2026-06-01T124607Z review bundle for the Watch List of pre-existing reconciliation items)"
