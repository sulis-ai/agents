# sulis-execution SDK codegen configuration
#
# Companion file to sulis-execution.openapi.yaml. Defines the shape of
# generated clients (resource tree, naming, errors, retries) without
# polluting the schema itself.
#
# Per the agent-consumable SDK spec (v0.2.0), this file is the codegen
# config layer; the OpenAPI file is the schema layer. They're separable
# — different generators can read the same OpenAPI with a different
# codegen config.

organization: sulis-ai
project: sulis-execution-sdk

# Generation targets
targets:
  - python:
      package_name: sulis_execution
      distribution_name: sulis-execution
      install_command: pip install sulis-execution
  - typescript:
      package_name: '@sulis-ai/execution'
      install_command: npm install @sulis-ai/execution
  - mcp_server:
      package_name: sulis-execution-mcp
      install_command: pip install sulis-execution-mcp

# Resource tree — flat OpenAPI paths grouped into resource.method
# 38 operations across 10 resources.
resources:
  pipeline:
    operations:
      run: pipelineRun
  train:
    operations:
      queue_list: trainQueueList
      queue_add: trainQueueAdd
      queue_remove: trainQueueRemove
      status: trainStatus
      doctor: trainDoctor
      run: trainRun
  index:
    operations:
      flip_status: indexFlipStatus
      set_status: indexSetStatus
      list_ready: indexListReady
      read_config: indexReadConfig
      propagate_blocked: indexPropagateBlocked
      add_wp: indexAddWp
      sync_auto_drafts: indexSyncAutoDrafts
  journal:
    operations:
      init: journalInit
      start_step: journalStartStep
      complete_step: journalCompleteStep
      record_attempt: journalRecordAttempt
      record_preflight: journalRecordPreflight
      record_postdeploy: journalRecordPostdeploy
      seed_plan: journalSeedPlan
      mark_plan_item: journalMarkPlanItem
      add_plan_item: journalAddPlanItem
      read: journalRead
  blocker:
    operations:
      write: blockerWrite
      archive: blockerArchive
  findings:
    operations:
      register: findingsRegister
      auto_draft_wp: findingsAutoDraftWp
  wp:
    operations:
      read_frontmatter: wpReadFrontmatter
      append_evidence: wpAppendEvidence
  worktree:
    operations:
      create: worktreeCreate
      remove: worktreeRemove
  step12:
    operations:
      wrap: step12Wrap
  change:
    operations:
      start: changeStart
      adopt: changeAdopt
      finish: changeFinish
      list: changeList
      status: changeStatus

# Binary name per resource — used by the codegen + the MCP server to
# resolve which CLI binary to invoke for each operation.
binary_per_resource:
  pipeline: wpx-pipeline
  train: wpx-train
  index: wpx-index
  journal: wpx-journal
  blocker: wpx-blocker
  findings: wpx-findings
  wp: wpx-wp
  worktree: wpx-worktree
  step12: wpx-step12
  change: sulis-change

# Error mapping per v0.2.0 Part 3 — three universal categories +
# wpx-domain extensions defined in Python/TypeScript client modules.
errors:
  classes:
    SulisExecutionError:
      python: SulisExecutionError
      typescript: SulisExecutionError
    ProtocolError:
      extends: SulisExecutionError
      python: ProtocolError
      typescript: ProtocolError
    ExpectedError:
      extends: SulisExecutionError
      python: ExpectedError
      typescript: ExpectedError
    InternalError:
      extends: SulisExecutionError
      python: InternalError
      typescript: InternalError

# Exit-code → category mapping (per Phase 0)
transport:
  binding: subprocess
  binary_lookup:
    strategy: env-or-path
    env_var: WPX_DIR
    fallback: $PATH
  exit_code_mapping:
    0: success
    1: expected_error
    2: internal_error
  protocol_error_signals:
    - binary_not_found
    - permission_denied
    - exec_failure

# Client settings
client_settings:
  default_timeout_seconds: 5400
  retries:
    enabled: false   # Local subprocess transport; no transient failures to retry
  telemetry:
    correlation_id_source: pid_plus_timestamp
