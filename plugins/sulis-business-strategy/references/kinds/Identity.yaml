# Kind: Identity
#
# A four-stage Kind that drives the discovery, articulation, or evolution of an
# organisation's identity. Replaces the legacy identity-articulation outcome's
# triad model (Belief Crystallizer / Authenticity Validator / Expression Architect)
# with the Kind schema's evaluate + decide loop — the rubric encodes what the
# three lenses collectively checked; the Verdict + reason_class_routing replaces
# triad consensus.
#
# Author-status: draft. Test fixture for the Kind-schema migration from
# identity-articulation v2.5.0.
#
# Until the platform engine wires Slices 2-4, the business-strategist agent
# drives all four stages manually (find → generate → evaluate → decide). When
# the engine catches up, the agent simplifies to invoking the Kind via
# KindHandler.

apiVersion: business-strategy/v1alpha1
kind: Identity

metadata:
  name: business-identity
  version: 0.1.0
  owner: business-strategy-studio
  status: draft

spec:
  # Overall iteration cap for the find → generate → evaluate → decide loop.
  # Per platform NFR-7, default is 3; platform hard cap is 10.
  max_iterations: 3

  # ─────────────────────────────────────────────────────────────────
  # Stage 1: find — deterministic context discovery
  # ─────────────────────────────────────────────────────────────────
  find:
    purpose: >
      Gather all context needed to discover, articulate, or evolve the
      organisation's identity: the WHY (tension + belief + cause), the HOW
      (core principles), the WHAT (offerings, personas, value proposition),
      the brand positioning, and the tone of voice. Emit a BRIEF_PACK.md
      that the generate stage will consume.

    toolkit: [read_file, glob, ripgrep]

    # PREREQUISITE: product/context/BUSINESS_CONTEXT.md MUST exist before this
    # Kind can run. It is the canonical input produced by the BusinessContext
    # Kind (run via /sulis-business-strategy:context first). The agent enforces
    # this precondition at the start of find — if BUSINESS_CONTEXT.md is missing,
    # the agent surfaces a clean prerequisite error and stops without proceeding
    # to generate.
    prerequisite_inputs:
      - path: product/context/BUSINESS_CONTEXT.md
        produced_by: business-strategy/v1alpha1/BusinessContext
        if_missing: stop_with_prerequisite_error
        prerequisite_kind: /sulis-business-strategy:context

    inputs_to_scan:
      # Pre-captured business context — REQUIRED (see prerequisite_inputs above)
      - "product/context/BUSINESS_CONTEXT.md"
      - "product/context/ledger/INDEX.md"
      - "product/context/ledger/entries/*.md"

      # Existing identity, if evolving rather than creating from scratch
      - "product/organization/IDENTITY.md"
      - "product/organization/BRAND.md"
      - "product/organization/TONE_OF_VOICE.md"
      - "product/organization/PRINCIPLES.md"

      # Strategic guardrails — vision + strategy + anti-goals constrain identity
      - "product/offerings/primary/VISION.md"
      - "product/offerings/primary/STRATEGY.md"
      - "product/offerings/primary/ANTI_GOALS.md"

      # Persona and experience context — grounds tone calibration in concrete users
      - "product/experience/PERSONAS.md"
      - "product/experience/EXPERIENCE_JOURNEYS.md"

      # Founder transcripts and materials — richest source for WHY discovery
      - "transcripts/**/*.md"
      - "transcripts/**/*.txt"
      - ".sulis/threads/sessions/*.jsonl"

      # Market and competitive context — required for distinctiveness validation
      - "product/research/**/*.md"

    output_artifacts:
      - path: find-output/IDENTITY_BRIEF_PACK.md
        schema_ref: identity_brief_pack_v1alpha1
      - path: find-output/CONVERSATION_TRACE.md
        schema_ref: references/kinds/schemas/conversation-trace.md
        # Find writes the trace's frontmatter + empty section headers (Phase A,
        # Phase B, Phase C, Phase D, Self-check log). Generate appends
        # incrementally as the conversation unfolds. See conversation-trace.md
        # for the recording discipline. The trace is the audit artifact that
        # makes the diverge-then-converge rhythm reviewable post-hoc, and
        # enables the Phase B self-check against the Claude Code session log.

    context_budget:
      tokens: 8000

    context:
      input: {}
      processing:
        precondition_check: >
          Before scanning inputs, verify product/context/BUSINESS_CONTEXT.md
          exists. If missing, halt with a clean prerequisite error directing
          the founder to run /sulis-business-strategy:context first. Do NOT
          silently degrade — identity work without business context produces
          weak results, and the BusinessContext Kind is the right tool for
          the gap.
        prioritise: >
          BUSINESS_CONTEXT.md is the primary input — Q1-Q4 (Identity & Team
          domain) ground the WHY discovery directly; the full document grounds
          the WHAT (offerings, market, customers) and the constraints (anti-
          goals from Q9). Existing IDENTITY.md (if present) signals evolution
          mode. Founder transcripts are richest source for tone and distinctive
          voice. Strategy and anti-goals provide guardrails for value
          proposition.
        b06_protocol: >
          Apply B-06 read-before-ask: candidate answers in BUSINESS_CONTEXT.md
          (especially Q1, Q2, Q3, Q4) are confirmed with the founder in one
          line rather than re-asked from scratch. Inference over interrogation.
        deduplicate: >
          When multiple sources cover the same ground (e.g., BUSINESS_CONTEXT
          and prior IDENTITY both describe the WHY), prefer the most recent
          and surface explicit deltas rather than restating.
      output:
        sections:
          - mode_signal              # "creation" (new identity) | "extraction" (from materials) | "evolution" (existing identity exists)
          - business_context_summary # consolidated view of WHO + WHAT + WHY signals
          - prior_identity_state     # if present: current articulation, age, drift signals
          - persona_and_journey_signals
          - founder_voice_signals    # phrases, recurring themes, distinctive language extracted from transcripts
          - strategic_guardrails     # from VISION + STRATEGY + ANTI_GOALS
          - competitor_signals       # from research; required for distinctiveness check

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: generate — produce IDENTITY.md
  # ─────────────────────────────────────────────────────────────────
  generate:
    target_file: product/organization/IDENTITY.md
    spec_ref: references/kinds/schemas/identity-instance.md
    inputs: []  # reads BRIEF_PACK only

    constraints:
      - "MECE: WHY, HOW, WHAT must be mutually exclusive and collectively exhaustive."
      - "Zero hyperbole: no superlatives, no 'passion / magic / empower / leverage / revolutionary'."
      - "Concrete over abstract: every belief is grounded in a quote or specific evidence from BRIEF_PACK."
      - "Falsifiability: every HOW principle includes 'what this rules out'."
      - "Tone: pragmatic authority (T-01) — speak as operator with results, not theorist with ideas. Radical clarity (T-02) — plain language, no romantic metaphors."
      - "Competitor substitution test: if a named competitor's name fits in the WHY statement, the statement is generic and must be revised."
      - "Evidence-to-claim ratio ≥ 4/5: every identity claim is grounded in a BRIEF_PACK quote or signal."

    token_budget:
      input: 12000
      output: 6000

    context:
      input: {}
      processing:
        approach: golden_circle    # WHY → HOW → WHAT sequence (beliefs before actions)
        fallback_if_why_unclear: action_first_discovery   # if WHY emerges weakly after one pass, derive WHY from observed HOW patterns
        diverge_then_converge: >
          The Golden Circle (WHY → HOW → WHAT) is the OUTPUT SHAPE, not the
          CONVERSATION SCRIPT. Drive the conversation in four phases:

          PHASE A — DIVERGENT ON WHY.
          Open hypothesis-first from BRIEF_PACK signals: "I'm reading a
          recurring thread about [X] in your transcripts — is that the
          tension that drives this?" Then FOLLOW THE THREAD. Listen for
          tension, belief, and cause as they emerge across multiple turns —
          don't ask "what's your WHY?" Ask: "What does the world not get yet
          that you do?" / "What would have to be true for [Y] to stop being
          a problem?" / "When did you first know this mattered?" Capture
          founder phrases verbatim — distinctive language is irreplaceable
          for voice and tone calibration. Reflect every 3-4 turns. Apply
          reality probes sparingly at pauses (max 1 per reflection):
          competitor invisibility, anti-goal contradiction, scope creep,
          generic-language drift.

          Stay in Phase A until ONE of:
          (a) Saturation signal — tension / belief / cause stop shifting
              across 3 turns;
          (b) Floor reached — 15 conversational turns elapsed.

          PHASE B — CONVERGENT ON WHY.
          Now restate the tension + belief + cause as a hypothesis: "Here's
          what I'm hearing — [tension]. [Belief]. [Cause]. Does that land,
          or am I off?" Iterate up to 3 passes until the founder confirms or
          you hit the iteration cap. Run the competitor substitution test
          inline: "If I put [named competitor] in this sentence, would it
          still fit?" If yes, the statement is generic — diverge again.

          PHASE C — HOW (3-5 PRINCIPLES).
          For each candidate principle, ask the trade-off question:
          "What does this rule out?" A principle without a trade-off is a
          platitude. Honour the founder's specific phrasing where it carries
          weight. Cap at 5 principles — cognitive load.

          PHASE D — WHAT + CONSOLIDATION.
          Persona and value proposition are largely synthesis from BRIEF_PACK
          + WHY + HOW. Surface a draft, take 1-2 rounds of refinement, then
          commit IDENTITY.md after the founder approves the draft.
        plain_english: >
          MANDATORY. Never use methodology codes (FE-NN, T-NN), schema field
          names, internal taxonomy, or jargon in questions to the founder.
          "Golden Circle" is fine if the founder has used the term; otherwise
          say "let's start with WHY before we get to HOW and WHAT."
        one_question_at_a_time: >
          MANDATORY. Ask ONE question. Wait for the response. Never batch.
          Reflection checkpoints are the only exception — they mirror back
          understanding and ask one verification question.
        reality_probes: >
          Watch silently for these patterns. Surface only at reflection
          checkpoints, max one per reflection:
            - Competitor invisibility: WHY discussed without naming any
              competitor; ask "who does the wrong version of this?"
            - Anti-goal contradiction: identity claim contradicts an
              ANTI_GOALS.md entry; surface the tension.
            - Generic-language drift: founder reaching for "we empower X"
              or "we revolutionise Y"; redirect to specific phrasing.
            - Aspirational completion: claims of capability that don't yet
              exist as if they're present; ask for staging language.
      output:
        section_order:
          - tagline
          - why_we_exist
          - our_approach_how
          - who_we_serve
          - value_proposition
          - success_looks_like
          - time_horizon
          - authenticity_validation
          - tone_validation

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: evaluate — apply the rubric, emit a Verdict
  # ─────────────────────────────────────────────────────────────────
  evaluate:
    rubric_ref: references/kinds/rubrics/identity-rubric.md
    verdict_path: find-output/IDENTITY_VERDICT.md
    verdict_schema_version: v1alpha1

    blocking_criteria:
      # If these fail, decide routes to `stop` regardless of reason class.
      - "competitor_substitution_test_fails"  # generic identity that any competitor could claim
      - "founder_evidence_missing"            # claims without grounded evidence
      - "anti_goal_contradiction"             # identity directly contradicts a published anti-goal

    context:
      input: {}
      processing: {}
      output: {}

    token_budget:
      input: 8000
      output: 2000

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: decide — route on Verdict
  # ─────────────────────────────────────────────────────────────────
  decide:
    max_iterations: 3
    on_max_iterations: stop
    five_whys_iterations: 5

    reason_class_routing:
      # Defaults from platform FR-7; surfaced explicitly here for clarity.
      content_deficient: regenerate      # rubric flagged a content issue → re-run generate with refined constraints
      context_deficient: re_find          # rubric flagged missing input signal → re-run find with broader scan
      technical_transient: retry          # transient error (LLM timeout, etc.) → stage-level retry, no Kind iteration cost
      technical_fatal: stop               # unrecoverable error → halt

    context:
      input: {}
      processing: {}
      output: {}
