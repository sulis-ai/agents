intent: "Stop Sulis claiming shipped/complete on an advisory CI gate. Root cause: the completion claim is grounded in branch-CI, which is advisory on the common founder repo (private+free, branch protection unavailable, #52/platform#36), so broken work merges + gets reported as a finished product while the blocking deploy gate fails. Fix: ground the definition of done in the gate that actually blocks; when CI is advisory (detected via the existing #52 protection-status), downgrade the claim to 'merged, not verified-shippable until the blocking gate is green' and never say shipped/complete. Wire the existing unprotected-repo detection into the completion claim across run-all, the agent body's definition-of-done, and GIT-05. Scope the programmatic deploy-gate poll as a follow-on. Closes the false-completion lesson."
