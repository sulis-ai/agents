intent: "Build the read-only cockpit MVP per plugins/sulis/docs/local-ui-design.md (recommendation: bespoke changes-as-threads cockpit; read-only first). A local web app (localhost; React client + small Node/Express server) that reads the EXISTING data layer ONLY: the global change store via _change_state.list_all_changes(), the worktrees on disk, and the Claude Code session transcripts under ~/.claude/projects/. Surfaces: (1) thread sidebar = every change with stage + liveness; (2) per-thread chat history rendered from the session transcript; (3) worktree file browser; (4) read-only file viewer (Monaco read-only) + diff vs the change's base_sha; (5) copy-link to a file (cockpit deep link). NO live chat/terminal bridge, NO editing, NO running the app — read-only review only (the stream-json live bridge is a later change; the spike already validated it). Touches no claude process. Code home: apps/cockpit/ in this repo (extractable later). Start with /sulis:specify to lock the MVP surface, then design + plan-work."
