intent: "Fix #87: session_is_live (pid_kind=session) returns True when the spawned launch.sh died and claude never started, because it checks 'any process on the tty' (the shell is still there) instead of 'claude is running'. Fix: for the session path, verify a claude process is actually on the tty (ps -t <tty> -o command= | grep claude), not just that the tty has any process. Refines #32. TDD: live when a claude process is on the tty; NOT live when only a shell is (the dead-spawn case)."
