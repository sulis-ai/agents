intent: "Close the parallel-WP shared-fixture collision gap (the fixture-shape-collision lesson, task #106 — NOT GitHub issue #106, which is unrelated and already fixed; do NOT add a Closes #106 trailer). During the comprehensive-spec build, two non-dependent same-batch WPs each authored the same logical fixture under divergent conventions (WP-001 sample-tool-surface/ dir+manifest, WP-002 sample-tool-surface.json flat file); no layer treated a shared fixture as a serialize/hoist point, so it only blew up at bundled-tip CI. Same structural defect as the existing #107/6.06 shared-artifact check, but with the contract seam removed. FIX (bounded, generalise existing machinery — do NOT build a new parallel mechanism): (a) CONVENTION in plugins/sulis/references/standards/WORK_PACKAGE_STANDARD.md — a test fixture consumed by >1 WP is authored by exactly ONE upstream WP that consumers dependOn; every WP MUST list new fixture paths under **Files created:** in its Contract. (b) DECOMPOSE-TIME CHECK in plugins/sulis/references/decompose-validation-rubric.md — generalise Phase 6.06 (or add 6.07 MUST) so two non-dependent WPs that Create fixtures resolving to the same LOGICAL name FAIL: normalise dir-vs-file forms (strip trailing slash + extension before comparing, so sample-tool-surface/ == sample-tool-surface.json) and drop the contract-seam precondition for the fixture case; remedy = serialize (add dep) or hoist a single fixture-authoring WP. Add the comprehensive-spec WP-001/002 case as the anchor + a version-history row. (c) plugins/sulis/skills/plan-work/SKILL.md — one bullet near step-11 P6 + the WP-08.5 hoist block: shared fixtures are hoisted to one upstream WP the same way shared producer artifacts are (extend existing language, don't duplicate). IMPORTANT: if a programmatic rubric-check surface exists (_route_rubric.py or a decompose-validation script that runs phases in code), implement 6.07 there + add a unit test (logical-name normalisation: dir-form collides with file-form; non-colliding names pass) — make it real-enforced, not prose-only. If the rubric is purely agent-applied prose, keep it consistent with how 6.06 is written and say so. SKIP the run-all guard (redundant once decompose gates it) and loader-hardening (symptom; optionally note as a SHOULD lesson). BUILD CAUTION: built from a non-spawned session via dispatched agent; integrate direct-merge-on-green (full unit suite), not the train."
