slug: "agent-execution-boundary"
primitive: "harden"
intent: "Harden the agent execution boundary as a three-layer capability model, universal where it can be: (L1) a mediated safe-fetch/search PROXY outside the agent — agent has no raw outbound socket, proxy fetches and returns content marked as untrusted DATA, scrubs secrets on the outbound request, keeps secrets out of the fetch path (Rule of Two) — a universal WALL for egress/injection-exfil that still lets the agent research the open web freely. (L2) scoped FILE-TOOLS extending the #130 within_change_scope pattern from remove to the full read/write/move surface — a universal GUARDRAIL that refuses out-of-scope paths, containing the honest-mistake class (e.g. the cross-worktree-deletion bug) and making each change's scope explicit-as-code; not a wall against a hijacked agent. (L3) the adversarial FILESYSTEM wall — per-OS native sandbox (Seatbelt/bubblewrap/Windows) as best-effort defense-in-depth now, with a remote-Linux/container substrate as the truly-universal answer DEFERRED until cloud is a concrete funded target. Each layer needs clear verifiable scenarios to test against. Grounded in three critical-thinking spirals (run_ids 01KW3BZNS…, 01KTZRTN0…, 01KTZTCSP2…)."
