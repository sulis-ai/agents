intent: "fix the recon's `_locate_code_areas` false positives — when an intent backticks a file path like `plugins/sulis/scripts/_change_context.py` or a symbol like `cmd_finish`, the current `git grep -l -F` returns files that MENTION the token in their content (often docs and changelogs) rather than the files those tokens REFER to. Two heuristics: (a) path-token recognition — if a token looks like a path (contains `/` or has a known extension), check whether the file exists directly and list it FIRST in the pointers section; (b) doc-file exclusion — filter `.md`/`.txt`/`.rst` matches from the symbol-grep results since they're usually mentioners not subjects. Edits `plugins/sulis/scripts/_change_context.py` and adds tests. Closes #31."
