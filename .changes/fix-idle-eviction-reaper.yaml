intent: "Stop the session daemon idle-evicting in-use pty sessions (#108) — root cause of spawned change windows dying mid-work. maintenance.py (~172, 30s interval) idle-evicts ANY live session whose last_activity is >600s old, but a pty session's last_activity only bumps on output bytes (session.py:791), so a turn quiet >10min (recon scan, long test) looks idle and gets reaped: evict=manager.close ends the viewer stream + SIGKILLs claude, _closing suppresses restart, window drops to bare shell. PRIMARY FIX: skip idle-eviction for a pty session with an ATTACHED VIEWER (open window = in use) — gate evict in maintenance.py tick (~271) on a has_viewers/viewer_count predicate injected from manager.py _viewer_registries (mirror the is_alive injection ~239). SECONDARY: bump last_activity on keystroke feed + a periodic liveness signal, not only output. DIAGNOSABILITY: add an eviction log line, and stop sending daemon stderr to DEVNULL (daemon_client.py:364). Files: plugins/sulis/scripts/_session_manager/maintenance.py, manager.py, session.py, daemon_client.py. NOT the recovery_used-never-resets alternate (separate). BUILD CAUTION: built from a non-spawned session via dispatched agent (a spawned window would be reaped by this very bug); integrate direct-merge-on-green (full unit suite), not the train."
