intent: "Stop the change intent/brief being contaminated by the assistant's own reply at interactive change-creation (the intent-contamination lesson, task-tracked; NOT GitHub issue #109 which is unrelated — no Closes trailer). Root cause (investigated): the Python pipeline stores --intent verbatim and the cockpit web composer (StartFromIntent.tsx -> useStartFromIntent -> SulisChangeStarter) passes it verbatim — both clean. The leak is the INTERACTIVE /sulis:change start path: skills/change/SKILL.md instructs the agent to author --intent (read/paraphrase the founder's intent, derive a slug) with NO rule that --intent MUST be the founder's verbatim words, so the agent's turn-state (a greeting/plan/reply) can get spliced into the argument — landing mid-string in change.json + pre_prompt.txt. FIX (bounded, skill-contract): in plugins/sulis/skills/change/SKILL.md, the  contract step 5 (~lines 111-161) — add a sharp rule that --intent MUST be the founder's own words copied verbatim (the literal text they typed asking to start the change), trimmed only of surrounding whitespace; NEVER the agent's paraphrase, plan sentence, greeting, or any model-generated text; if no founder text is available, prompt for it — do not synthesize. Keep slug + primitive agent-derived (those are correct). Add a Gotcha + Vocabulary note as fits the skill's style. TESTS (lock the clean side so it can't regress): (1) Python characterisation — sulis-change start --intent 'FOUNDER_VERBATIM_SENTINEL' against a temp SULIS_STATE_DIR + temp repo, assert change.json.intent == the sentinel exactly AND ~/.sulis/changes/{id}/pre_prompt.txt contains it with no assistant text (lock the verbatim pipeline); (2) cockpit vitest regression — drive useStartFromIntent.propose('KNOWN_INTENT') then confirm(), assert the stubbed StartChangeRunner.start received intent:'KNOWN_INTENT' verbatim (extend apps/cockpit/server/tests near routes.startChange.test.ts; run via npm test = vitest run). The interactive-path fix is a behavioral contract (prose) — be honest about that in the report; the pipeline + web path are test-locked. Do NOT build a fragile content-heuristic guard that scans intent for 'assistant-turn markers' (false-positive prone — the investigation rejected it). BUILD CAUTION: built from a non-spawned session via dispatched agent; integrate direct-merge-on-green (full unit suite + cockpit npm test), not the train."
