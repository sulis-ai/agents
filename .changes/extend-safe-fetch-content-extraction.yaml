intent: "Extend the L1 safe-fetch proxy with content processing: return clean extracted content instead of raw HTML by default. Add a 'format' parameter — raw (verbatim, current behaviour) | text | markdown | structured (JSON with url/title/content/links/fetched_at) — defaulting to processed/markdown (readable + token-cheap). Use the established main-content extractor trafilatura (CP-preferred over hand-rolled BeautifulSoup) behind the proxy's existing framing seam; FetchResult gains a format field; everything stays wrapped as untrusted data. Honest scope: stripping HTML removes active/hidden content (scripts/comments/hidden nodes) = defence-in-depth, but does NOT remove prompt-injection (natural-language survives extraction) — the injection control remains treat-as-data + no-raw-egress. Follow-on to L1 (shipped v0.160.0); precedes L3."
