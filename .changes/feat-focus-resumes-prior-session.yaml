intent: "Make /sulis:change focus RESUME the prior claude conversation when one exists, instead of always spawning a fresh self-orienting session. The plumbing mostly exists: the session-manager claude adapter already supports --resume <resume_ref> (adapters/claude.py:129-134) and the lifecycle does restart→resume (lifecycle.py); claude transcripts persist in ~/.claude/projects. Today focus re-spawns fresh via launch_change_terminal with the pre-prompt sidecar (re-orients from CONTEXT.md + Working Set + journal) — it does NOT pass a resume_ref. WIRE IT: on focus of a change that has a prior session, pass its resume reference so the daemon resumes the prior conversation; fall back to today's fresh-self-orient behaviour when there is no prior session/transcript. DESIGN WRINKLE the build must resolve: how to know WHICH session to resume — pin the claude session id deterministically at launch (e.g. launch claude with a known --session-id derived from / recorded against the change) so resume is exact, OR discover the most-recent transcript for the change's worktree project dir. Prefer the deterministic pinned-id approach if claude supports --session-id; record it against the change (change store / session.json) at first spawn, read it on focus. Files: plugins/sulis/scripts/_terminal_launcher.py (launch_change_terminal + the focus re-spawn path), plugins/sulis/skills/change/SKILL.md (focus subcommand), _session_manager/adapters/claude.py (resume_ref already supported), the change/session state that records the session id. Keep the fresh-spawn fallback intact. BUILD CAUTION: built from a non-spawned session via dispatched agent; integrate direct-merge-on-green (full unit suite, test-first: focus with a prior session passes resume_ref; focus with none spawns fresh), not the train."
