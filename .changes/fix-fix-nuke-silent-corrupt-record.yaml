intent: "fix the silent fail-open in `cmd_nuke`'s shipped-protection guard — `read_change_record` in `plugins/sulis/scripts/_change_state.py` returns `None` for BOTH 'file doesn't exist' (legitimate) AND 'file exists but is corrupt/unreadable' (silent failure), so a corrupt `change.json` lets `nuke` proceed without protection. Distinguish the two cases at the `cmd_nuke` call site in `plugins/sulis/scripts/sulis-change` — add a helper that returns true iff the record file exists but reads as None, and refuse the nuke with a distinct error message in that case. Closes #22 — the original integration-test target."
