intent: "Harden the ship path against the multi-worktree model (closes #56). (1) Ship worktree-aware: cmd_finish must never blind 'git checkout {base}' in repo_root — detect where {base} lives via 'git worktree list --porcelain' and merge there / update the ref / refuse with an actionable message naming the holder. (2) Remove the change's worktree on ship (gated on session_is_live #32) but KEEP the branch + change record — claim-3-validated safe (cockpit uses worktree_path only for .exists(), retrace is git-based via base_sha+branch), preserves the #38 keep-visible intent via the branch, ends sprawl, shrinks #56's trigger. (3) Conventional-Commit squash message derived from {primitive}: {slug} + correct co-authorship, not hardcoded feat({branch}): squash-merge. (4) Slug-doubling fix: don't re-prefix when slug starts with the primitive (fix-fix- -> fix-). Tier-2 bare-repo topology deferred as a separate lesson."
