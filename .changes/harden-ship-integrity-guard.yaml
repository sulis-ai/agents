primitive: "harden"
intent: "Make it impossible for a change to read shipped without actually being on main (the ship-integrity gap found during the WP-id recovery). CH-7BF1VZ was flipped to stage=shipped and its branch deleted, but the squash-merge to main never landed — so the shipped label lied and the work was nearly lost. Root: sulis-change mark-shipped flips stage->shipped + pins shipped_sha independently of whether the merge actually happened; any caller (incl. a flailing/reaped session) can mark shipped without a landed merge. FIX: add a merge-verification guard INSIDE cmd_mark_shipped (tool-level, so it holds regardless of caller): before flipping stage->shipped, CONFIRM the change is genuinely merged to main, else REFUSE with a clear error. Confirm via the most reliable signal — gh pr list --head change/{branch} --base main --state merged --json number,mergeCommit (authoritative, network) and/or an explicit --merge-sha verified as an ancestor of origin/main (git merge-base --is-ancestor) for manual merges; when neither confirms, refuse. Pin shipped_sha to the MERGE COMMIT on main (the true shipped state), not the local branch tip, when known. Provide a logged --force escape for genuine edge cases (records the override). Do NOT guard branch-deletion separately — that already only happens via gh pr merge --delete-branch on a successful merge; the gap is mark-shipped being independent. INVESTIGATE first: cmd_mark_shipped in plugins/sulis/scripts/sulis-change (current behaviour + where stage/shipped_sha are written), the change skill ship flow step 6 mark-shipped call (skills/change/SKILL.md ~step 5-6), and how a squash-merge is best confirmed (squash loses commit-ancestry, so prefer the gh merged-PR signal or an explicit merge-sha). TEST-FIRST (tests/unit/): mark-shipped REFUSES when no merged PR / no valid --merge-sha (stub the gh/merge check); SUCCEEDS + pins shipped_sha to the merge commit when merged; --force overrides with a logged note. BUILD CAUTION: built from a non-spawned session via dispatched agent; integrate direct-merge-on-green (full unit suite), not the train."
