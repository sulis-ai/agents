intent: "Fix the systemic tool-resolution bug: every skill resolves its scripts dir by globbing the plugin cache and lexically sorting (find ... | sort -r | head -1), which picks the wrong version once 0.100+ versions exist (text-order ranks 0.98.0 above 0.126.0). 18 files affected. Replace with a version-correct resolution (prefer resolving relative to the running version's own dir; eliminate the cross-version cache pick), and add cache pruning as defence-in-depth. Surfaced as #49 + observed binding to stale 0.98.0 in a live session."
