intent: "Fix /sulis:discover-project verify gate (rolls back EVERY mint in consumer repos). Three bugs: (1) _discovery/verifier.py calls 'check-canonical-drift.py --scope <entity>' but the checker has no --scope flag — add a --scope <entity-file> mode that schema-validates one entity + applies the cross-tenant-ref allowlist WITHOUT requiring --yaml-path; (2) _DEFAULT_DRIFT_DETECTOR is cwd-relative — resolve it relative to __file__ so it works in consumer repos; (3) discover records primary_branch as the checked-out branch instead of the repo default (main). TDD-first; add a consumer-repo regression test + a real-subprocess --scope test (the gap that let this ship)."
