slug: "spawn-prompt-via-file"
primitive: "fix"
intent: "Fix #86: launch_change_terminal embeds the spawn pre_prompt as a quoted heredoc nested inside $(...) inside double-quotes, which macOS bash 3.2 mis-parses — any apostrophe in the brief aborts the launch silently and claude never starts. Fix: write the pre_prompt to a sidecar file in the session dir and have launch.sh read it via \"$(cat <file>)\" — no heredoc nesting, parses clean under bash 3.2, and the brief becomes inspectable. TDD: generated launch.sh must pass bash -n even with apostrophes/quotes/backticks in the pre_prompt; sidecar carries the exact bytes."
