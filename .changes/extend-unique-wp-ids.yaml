intent: "Make Work Package / task ids globally unique by prefixing the change handle: mint ids as {CH-HANDLE}-WP-NNN (e.g. CH-7BF1VZ-WP-001), keeping the human 1/2/3 sequence but disambiguating across changes. Builds directly on the wp-branch-collision change (PR #283), which already namespaces WP *branches* per-change as wp/{primitive}-{slug}/wp-NNN; this does the same for the *id*. Scope: update the WP-id mint path so new ids carry the handle prefix; teach the INDEX parser + wpx tooling (parse_index_md, resolve_wp_branch wiring, status/eligibility) to read the new prefixed shape while still understanding legacy bare WP-NNN ids for one release (back-compat); reconcile WORK_PACKAGE_STANDARD (the id row) + change-work-standard; extend the wpx test fixtures with prefixed-id coverage. The per-change NNN sequencing logic itself does not change — only the rendered id label. Reconcile with (and supersede, do not duplicate) the parked canonicalise-cross-wp-ids effort."
