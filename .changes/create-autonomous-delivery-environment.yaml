intent: "Build a thin, shippable first slice of the Autonomous Delivery Environment (the cockpit — a non-technical founder drives the whole product lifecycle through changes-as-threads). PRIMARY PURPOSE: road-test the testable-state scenario loop just shipped in sulis v0.90.0 (PR #154) by taking THIS change through the full process end-to-end: /sulis:specify (author plain-English verification journeys -> emitted as Scenario + Workflow + IDEF0 Step entities into the brain), /sulis:draft-architecture (resolves the Scenario.exercises -> Design synthetic placeholder to the real emitted Design), implement, then /sulis:verify-acceptance --scenario <id> (run the scenarios straight from the brain graph, no hand-built bundle). This is the first real founder-driven dogfood of that loop end to end. Watch for friction in the specify->author->emit->resolve->run flow and capture lessons. Context to read: plugins/sulis/docs/scenario-authoring-source-design.md (the design); the new tools sulis-author-scenario, sulis-emit-{tool,step,workflow,scenario}, sulis-resolve-scenario-design, and sulis-verify-acceptance --scenario; plugins/sulis/docs/local-ui-design.md (cockpit UI); and the ADE vision (tasks #62/#63). Scope the first slice thin enough to actually ship AND verify through the new loop."
