intent: "Replace the cockpit's stateless spawn-per-message chat bridge with a persistent, server-owned Claude session per change — one warm 'claude -p --input-format stream-json --output-format stream-json --include-partial-messages' process kept alive and fed many messages over stdin — eliminating the ~40-60s per-message cold start and the 'blackbox of not responding'. Add lifecycle management (health-check, restart-on-death, resume-from-transcript on first spawn, idle-eviction, memory cap) and surface the bound PID. Reuse the SessionBridge port + binding guard + stream-json parsing (streamJsonToEvents); adapt the reader to per-message boundaries (result/success) instead of process-exit. A full design brief is in .changes/refactor-persistent-chat-sessions.DESIGN.md. Reference pattern: /Users/iain/Documents/repos/ae/ae_task_executor (claude_session.py, monitored_claude_session.py, terminal_pool.py)."
