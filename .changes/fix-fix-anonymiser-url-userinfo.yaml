intent: "Fix #39 — anonymiser URL pass should redact the WHOLE URL when embedded credentials (userinfo@) are present, regardless of whether the host is on the allowlist. Today the host extractor splits on ':' so 'user:password@host' → 'user' as host, which falls through to the not-allowlisted branch by accident. Per the lesson body's required behaviour: when userinfo is present, credentials are always sensitive — redact to <url>; don't even try the allowlist check."
