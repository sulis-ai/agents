decisions_summary:
  - id: ADR-001
    decision: |
      Consumer shims pin to a SemVer plugin tag by default
      (`@sulis-vN.M.K`). `@dev` always-track is documented as opt-in with
      explicit risk language. Aligns with NFR-008 and MUC-006.
  - id: ADR-002
    decision: |
      Back-merge PRs opened on the raced path enable auto-merge after CI
      green. The PR is a recovery from a race the robot caused, not new
      review-worthy work. FR-003.
  - id: ADR-003
    decision: |
      Drift detection fires in BOTH `/sulis:release-train` and
      `/sulis:change start`. Shared bash helper at
      `plugins/sulis/scripts/drift_check.sh` (boring code, single source of
      truth). FR-009 + FR-010.
  - id: ADR-004
    decision: |
      GIT-12 is appended after GIT-11 in
      `plugins/sulis/references/git-workflow-standard.md`. No doc
      re-versioning; the standards file's calibration period continues
      unchanged.
  - id: ADR-005
    decision: |
      The pin is written as an HTML comment at the bottom of the release PR
      body: `<!-- dev-sha-at-open: <40-char-SHA> -->`. Comments don't render
      in the GitHub UI but survive `gh pr view --json body` extraction.
  - id: ADR-006
    decision: |
      The workflow reads the pin via
      `gh api repos/{owner}/{repo}/commits/${GITHUB_SHA}/pulls --jq '.[0].body'`
      then regex-extracts `dev-sha-at-open: ([a-f0-9]{40})`. Missing or
      malformed pin → fall through to PR path (safe default).

work_package_signal:
  estimated_count: 8
  notes: |
    See HANDOFF_TO_SEA "WP decomposition signal" — 8 atomic WPs cover the
    work. WP-001 moves the existing YAML to the new location; WP-002
    replaces the marketplace's own workflow with a shim; WP-003 adds the
    back-merge step to the reusable workflow; WP-004/005 wire the pin
    writer and drift check into release-train + change-start; WP-006
    appends GIT-12; WP-007 writes the ADR set as artifacts (covered by
    THIS deliverable); WP-008 adds the test suite.
    The architecture stage produces the ADRs in `.architecture/.../adrs/`;
    /sulis:plan-work decides whether to also emit a "ship the ADRs as
    repo artifacts" WP.

