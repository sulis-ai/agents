# This change embeds the shipped L1 (safe-fetch) + L2 (scoped file-tools) into
# the agent's governed action-surface via the Claude Code harness — NOT prose,
# NOT a CLI→MCP migration. A bounded MCP carve-out + one governance hook + one
# shared write-roots resolver. Decisions D1–D8 are LOCKED upstream.

components:
  - safe-tools-mcp-server   # Phase 1 — Python stdio MCP wrapping _safe_fetch + _file_tools
  - pretooluse-hook         # Phase 2 — write-roots scope deny + Bash-family governance
  - write-roots-resolver    # Phase 3 — one resolver, shared by file-tools + sandbox recipe
  - sandbox-recipe          # Phase 4 — doc/config (locus iii backstop)
  - governed-action-surface-standard  # Phase 5 — the D8 2-axis criterion + quality nudge

enforcement_loci:           # the honesty primitive — every rule names exactly one
  i_model:   prose (advisory, bypassable) — quality nudge only
  ii_harness: permission deny-rules + PreToolUse hook (deterministic; deny overrides allow)
  iii_os:    the shipped Seatbelt/bubblewrap sandbox (covers spawned subprocesses)

deferred:
