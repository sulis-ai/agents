# Repository Contract — project-specific configuration (RC v0.3.0 profile model)
# Read by wpx-arrival-check + the bootstrap script + the RC-13 workflow command slots.

repo: sulis-ai/agents
owner: iainn

# Brain location is the user-level central default (dogfood: behave like installed users). See ADR-001.

# --- Profile + contribution model (RC v0.3.0) --------------------------------
# This is a Claude Code plugin MARKETPLACE — a published artifact, not a
# deployable web product. The dev branch IS the installable surface (consumers
# point extraKnownMarketplaces at the repo); a SemVer tag on main IS the
# release (consumers install from it). No runtime, no URL, no servers.
#
# profile: published-artifact  → RC-05 environments are a formality (WARN),
#   RC-06 deploy-token secrets are N/A, RC-08 tag signing is SHOULD. The
#   deploy/health/release workflows are kept structurally but their command
#   slots run manifest validation + version-drift + plugin-load checks.
# contribution_model: solo     → no merge queue (RC-03 MUST-NOT); changes
#   merge directly to dev on branch-ci green per GIT-05.
#
# This replaces the v0.2.0 `deploy_target: none` deviation hack — the three
# relaxations (RC-05/06/08) are now defined behaviour of the published-artifact
# profile, not exceptions. deploy_target retained below as a back-compat alias.
profile: published-artifact
contribution_model: solo
deploy_target: none           # back-compat alias; `profile` is authoritative

# --- Project-specific command slots (filled into RC-13 templates) ------------
commands:
  lint: |
    python3 -c "import json,glob; [json.load(open(f)) for f in ['.claude-plugin/marketplace.json', *glob.glob('plugins/*/.claude-plugin/plugin.json')]]"
    python3 -m compileall -q plugins/sulis/scripts
  type_check: ""              # no type-checker; stdlib-only tooling per plugin contract
  unit_tests: pytest plugins/sulis/scripts/tests/unit/ -q
  smoke: |
    python3 -c "import json; m=json.load(open('.claude-plugin/marketplace.json')); assert m['plugins']"
  integration: |
    python3 -c "import json,os; mp=json.load(open('.claude-plugin/marketplace.json')); [json.load(open(os.path.join(p['source'].lstrip('./'),'.claude-plugin','plugin.json'))) for p in mp['plugins']]"
  e2e: ""                     # marketplace has no runtime e2e; unit+integration is the full gate
  deploy_staging: "published-artifact: validate installable marketplace + version-drift (see deploy-staging.yml)"
  deploy_prod: "published-artifact: publish GitHub Release from tag (see release-prod.yml)"

# --- Rules enforced by the profile -------------------------------------------
# Profile-invariant MUSTs (all profiles): RC-01 dev/main, RC-02 protections
# (branch-ci-only required check per the v0.3.0 deadlock fix), RC-07 squash
# settings, RC-09 token scopes, RC-11 arrival check, RC-12 refusal.
# RC-10 CODEOWNERS: SHOULD.
# Volume (solo): RC-03 merge queue MUST-NOT.
# Profile-specific (published-artifact): RC-04 branch-ci + promote + repurposed
#   deploy/health/release; RC-05 WARN; RC-06 N/A; RC-08 SHOULD.
# See plugins/sulis/references/repository-contract-standard.md for the matrix.
